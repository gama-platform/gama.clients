name: Python Continuous Integration

on:
  push:
    paths:
    - 'python'
  workflow_dispatch: # For manual trigger

jobs:
  release-build:
    runs-on: ubuntu-latest
    if: github.actor != 'gama-bot'
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Prepare GAMA to start in headless
        run: |
          sudo apt install -y jq curl wget
          echo "Downloading pre-release: " \
            $(curl -s "https://api.github.com/repos/gama-platform/gama/releases?per_page=1" | jq '.[] | select(.prerelease == true) | .tag_name' | tr -d \") \
            ", with link: " \
            $(curl -s "https://api.github.com/repos/gama-platform/gama/releases?per_page=1" | jq '.[] | select(.prerelease == true) | .assets[] | select(.name | test("Linux.*JDK.*\\.zip")) | .browser_download_url' | tr -d \")
          # Real download
          wget -q $(curl -s "https://api.github.com/repos/gama-platform/gama/releases?per_page=1" | jq '.[] | select(.prerelease == true) | .assets[] | select(.name | test("Linux.*JDK.*\\.zip")) | .browser_download_url' | tr -d \") -O "gama-alpha.zip"
          unzip -q gama-alpha.zip && rm gama-alpha.zip
          # Start GAMA Server as a background job
          bash ./headless/gama-headless.sh -socket 6868 &

      - name: Install package
        working-directory: ./python
        run: pip install -e .

      - name: Unit testing
        working-directory: ./python
        continue-on-error: true
        run: |
          pip install pytest
          python -m pytest tests/ --junit-xml=test-results.xml -q

      - name: Test summary
        if: always()
        working-directory: ./python
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os, sys

          try:
              root = ET.parse('test-results.xml').getroot()
          except FileNotFoundError:
              print("::warning::test-results.xml not found — pytest may not have run")
              sys.exit(0)

          failures, total = [], 0
          for case in root.iter('testcase'):
              total += 1
              el = case.find('failure') or case.find('error')
              if el is not None:
                  cls  = case.get('classname', '')
                  name = case.get('name', '')
                  msg  = (el.get('message') or el.text or '').strip().split('\n')[0]
                  # Build file path from dotted classname (e.g. tests.sync_test.test_foo.TestFoo -> tests/sync_test/test_foo.py)
                  module = cls.rsplit('.', 1)[0].replace('.', '/')
                  file_path = module + '.py'
                  failures.append((file_path, name, msg))
                  # Escape special characters for GHA annotation format
                  safe_msg = msg.replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A').replace(':', '%3A')
                  print(f"::error file={file_path},title={name}::{safe_msg}")

          with open(os.getenv('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
              if failures:
                  f.write(f"## ❌ {len(failures)} / {total} tests failed\n\n")
                  f.write("| File | Test | Error |\n|---|---|---|\n")
                  for fp, name, msg in failures:
                      f.write(f"| `{fp}` | `{name}` | {msg[:150]} |\n")
              else:
                  f.write(f"## ✅ All {total} tests passed\n")

          sys.exit(1 if failures else 0)
          PYEOF
