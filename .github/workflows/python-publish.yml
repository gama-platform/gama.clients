# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: PypI Release Package

on:
  workflow_dispatch: # For manual trigger
    inputs:
      BUMP_VERSION_NUMBER:
        description: "Version number to bump to, e.g. 2.0.1 (leading 'v' is stripped; empty = publish current pyproject version)"
        required: false
        default: ""
        type: string

jobs:
  release-build:
    runs-on: ubuntu-latest

    # Required for PyPI Trusted Publishing (OIDC). Without id-token: write,
    # pypa/gh-action-pypi-publish cannot retrieve the OIDC token and fails with
    # "ACTIONS_ID_TOKEN_REQUEST_TOKEN environment variable was unset".
    # contents: write is needed for git push (version bump) and gh release create.
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Normalize version input
        if: "${{ inputs.BUMP_VERSION_NUMBER != '' }}"
        id: version
        run: |
          raw='${{ inputs.BUMP_VERSION_NUMBER }}'
          # Strip leading 'v' if present — pyproject expects a PEP 440 version
          # (no 'v' prefix), while git tags / release titles conventionally use one.
          clean="${raw#v}"
          echo "clean=$clean"   >> "$GITHUB_OUTPUT"
          echo "tag=v$clean"    >> "$GITHUB_OUTPUT"
          echo "Resolved: pyproject version='$clean', release tag='v$clean'"

      - name: Bump pyproject.toml version
        if: "${{ inputs.BUMP_VERSION_NUMBER != '' }}"
        working-directory: ./python
        run: |
          sed -i "s/^version =.*/version = \"${{ steps.version.outputs.clean }}\"/g" ./pyproject.toml
          grep '^version' ./pyproject.toml

      - name: Build release distributions
        working-directory: ./python
        run: |
          python -m pip install build twine
          python -m build

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ github.workspace }}/python/dist/

      - name: Commit version bump
        if: "${{ inputs.BUMP_VERSION_NUMBER != '' }}"
        working-directory: ./python
        run: |
          git config --global user.email "my.gama.bot@gmail.com"
          git config --global user.name "GAMA Bot"
          git remote set-url origin https://gama-bot:$BOT_TOKEN@github.com/gama-platform/gama.clients.git
          git add ./pyproject.toml
          git commit -m "Bump python package version to ${{ steps.version.outputs.clean }}"
          git push
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

      - name: Create GitHub release with built binaries
        if: "${{ inputs.BUMP_VERSION_NUMBER != '' }}"
        working-directory: ./python
        env:
          # Using BOT_TOKEN to stay consistent with the commit step above (handles
          # potential branch/tag protection rules). GITHUB_TOKEN with contents:write
          # would also work in most cases.
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          gh release create "$tag" \
            --target main \
            --title "Python wrapper $tag" \
            --notes "Python wrapper $tag — published to PyPI as \`gama_client==${{ steps.version.outputs.clean }}\`." \
            dist/*