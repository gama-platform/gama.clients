name: GAMA Python Integration Tests

on:
  push:
    paths:
      - 'python/**'
      - 'tests/gaml/**'
  pull_request:
    paths:
      - 'python/**'
      - 'tests/gaml/**'
  workflow_dispatch:
    inputs:
      release:
        description: 'GAMA Release Tag (e.g. 1.9.3, leave empty for latest stable)'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: ./python
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest pytest-asyncio

      - name: Prepare GAMA Server
        run: |
          sudo apt update
          sudo apt install -y jq curl wget unzip
          
          # Determine the API URL for the release
          if [ -z "${{ github.event.inputs.release }}" ]; then
            # Default to latest stable release
            API_URL="https://api.github.com/repos/gama-platform/gama/releases/latest"
          else
            # Use specified release tag
            API_URL="https://api.github.com/repos/gama-platform/gama/releases/tags/${{ github.event.inputs.release }}"
          fi
          
          echo "Fetching release info from $API_URL"
          DOWNLOAD_URL=$(curl -s "$API_URL" | jq -r '.assets[] | select(.name | test("Linux.*JDK.*\\.zip")) | .browser_download_url')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "Error: Could not find a suitable Linux JDK asset for the selected release."
            exit 1
          fi
          
          echo "Downloading GAMA from $DOWNLOAD_URL"
          wget -q "$DOWNLOAD_URL" -O "gama.zip"
          unzip -q gama.zip
          
          # Find the headless script
          HEADLESS_SCRIPT=$(find . -name "gama-headless.sh" | head -n 1)
          if [ -z "$HEADLESS_SCRIPT" ]; then
            echo "Error: gama-headless.sh not found"
            exit 1
          fi
          echo "GAMA headless script found at: $HEADLESS_SCRIPT"
          chmod +x "$HEADLESS_SCRIPT"
          
          # Start GAMA Server as a background job
          bash "$HEADLESS_SCRIPT" -socket 6868 &
          
      - name: Wait for GAMA Server to be ready
        run: |
          echo "Waiting for GAMA Server to start on port 6868..."
          # We use a small python script to test connection to the server
          python3 -c "
          import socket
          import time
          import sys

          start_time = time.time()
          timeout = 120 # 2 minutes
          ready = False

          while time.time() - start_time < timeout:
              try:
                  with socket.create_connection(('localhost', 6868), timeout=1):
                      print('GAMA Server is ready and listening on port 6868!')
                      ready = True
                      break
              except (socket.timeout, ConnectionRefusedError, OSError):
                  print(f'Server not ready yet, waiting... ({int(time.time() - start_time)}s)')
                  time.sleep(2)

          if not ready:
              print('Error: GAMA Server failed to start within the timeout period.')
              sys.exit(1)
          "

      - name: Run Python Unit Tests
        working-directory: ./python
        run: |
          # Use pytest for better reporting
          # Use importlib mode to avoid import file mismatch errors when multiple tests have the same name
          pytest tests -v --tb=short --import-mode=importlib

      - name: Test Summary
        if: always()
        run: |
          echo "Tests finished. See the 'Run Python Unit Tests' step for details."
